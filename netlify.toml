[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

# SPA catch-all: serve index.html for all client-side routes
[[redirects]]
  from = "/api/*"
  to = "https://techtitanbackend-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
